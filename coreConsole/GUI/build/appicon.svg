      <stop offset="0" stop-color="#66E3F0"/>
      <stop offset="1" stop-color="#3B82C4"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect x="64" y="64" width="896" height="896" rx="200" ry="200"/>
